# Retry Consumer App 配置
# v2.1.0

# 应用配置
app.name=retry-consumer-app
app.mode=standalone

# RocketMQ 配置
rocketmq.nameserver.address=rocketmq-namesrv:9876
rocketmq.consumer.group=attribution-retry-consumer-group
rocketmq.consumer.topic=attribution-retry
rocketmq.consumer.thread.min=4
rocketmq.consumer.thread.max=16

# RocketMQ Producer 配置
rocketmq.producer.group=attribution-retry-producer
rocketmq.dlq.topic=attribution-retry_DLQ

# Kafka 配置
kafka.bootstrap.servers=kafka:29092
kafka.success.topic=attribution-results-success

# Click 存储后端配置
# 可选值：redis（默认）, fluss-cluster
# 注意：不支持 local-cache，因为三个独立 JVM 进程需要共享存储
click.store.type=redis
fluss.bootstrap.servers=fluss:9110
fluss.kv.table.name=attribution-clicks

# Redis 配置（当 click.store.type=redis 时）
click.redis.host=redis  # Docker 环境使用 "redis"，本地使用 "localhost"
click.redis.port=6379
click.redis.ttl-seconds=3600

# 重试配置
retry.max.count=10

# 监控配置
metrics.enabled=true
metrics.port=9092
