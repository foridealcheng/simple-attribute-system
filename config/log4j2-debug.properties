# Flink DEBUG 日志配置

# Root logger
rootLogger.level = DEBUG
rootLogger.appenderRef.console.ref = ConsoleAppender

# Console appender
appender.console.name = ConsoleAppender
appender.console.type = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n

# Flink loggers
logger.flink.name = org.apache.flink
logger.flink.level = DEBUG

# Kafka connector
logger.kafka.name = org.apache.flink.connector.kafka
logger.kafka.level = DEBUG

# Attribution
logger.attribution.name = com.attribution
logger.attribution.level = DEBUG

# Sink loggers
logger.sink.name = com.attribution.sink
logger.sink.level = DEBUG

# Engine
logger.engine.name = com.attribution.engine
logger.engine.level = DEBUG

# Client
logger.client.name = com.attribution.client
logger.client.level = DEBUG
